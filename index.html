<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Barbearia Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TOPO -->
    <header class="topo">
        <h1>Barbearia Premium</h1>

        <div class="area-login">
            <button onclick="abrirModal()">Login / Entrar</button>
            <button onclick="logout()">Sair</button>
        </div>
    </header>

    <!-- SERVIÇOS -->
    <section class="servicos">

        <div class="card">
            <h2>Corte Masculino</h2>
            <button onclick="abrirAgendamento('Corte Masculino')">
                Agendar
            </button>
        </div>

        <div class="card">
            <h2>Barba</h2>
            <button onclick="abrirAgendamento('Barba')">
                Agendar
            </button>
        </div>

        <div class="card">
            <h2>Corte + Barba</h2>
            <button onclick="abrirAgendamento('Corte + Barba')">
                Agendar
            </button>
        </div>

    </section>

    <!-- MODAL LOGIN -->
    <div id="modalLogin" class="modal">
        <div class="modal-content">
            <h2>Login / Cadastro</h2>

            <input type="email" id="email" placeholder="Email">
            <input type="password" id="senha" placeholder="Senha">

            <button onclick="login()">Entrar</button>
            <button onclick="registrar()">Registrar</button>
            <button onclick="fecharModal()">Fechar</button>
        </div>
    </div>

    <!-- MODAL AGENDAMENTO -->
    <div id="modalAgendamento" class="modal">
        <div class="modal-content">
            <h2>Agendar Serviço</h2>

            <input type="date" id="data">
            <input type="time" id="hora">

            <button onclick="confirmarAgendamento()">
                Confirmar
            </button>

            <button onclick="fecharAgendamento()">
                Cancelar
            </button>
        </div>
    </div>

<script>
    // =========================
    // CONTROLE DOS MODAIS
    // =========================

    let servicoSelecionado = "";

    function abrirModal() {
        document.getElementById("modalLogin").style.display = "flex";
    }

    function fecharModal() {
        document.getElementById("modalLogin").style.display = "none";
    }

    function abrirAgendamento(servico) {
        servicoSelecionado = servico;
        document.getElementById("modalAgendamento").style.display = "flex";
    }

    function fecharAgendamento() {
        document.getElementById("modalAgendamento").style.display = "none";
    }

    function confirmarAgendamento() {
        const data = document.getElementById("data").value;
        const hora = document.getElementById("hora").value;

        salvarAgendamento(servicoSelecionado, data, hora);

        fecharAgendamento();
    }
</script>

<!-- 🔥 FIREBASE -->
<script type="module" src="script.js"></script>

</body>
</html>
